id: ASSUM-SYS-001
title: Network connectivity is available during normal operation
type: assumption
status: draft
owner: systems-team
version: "1.0"
assumption:
  text: |
    The embedded device has a reliable network connection to the backend
    services during all normal operating modes.  Intermittent connectivity
    (e.g. tunnels, airplane mode) is considered an edge case, not the
    primary operating mode.
  status: open
  source: DOC-DEPLOY-001
rationale: |
  Designing for permanent offline operation would require significant
  additional engineering effort.  The assumption is validated by the
  target deployment environment specification (see DOC-DEPLOY-001).
tags:
  - network
  - connectivity
  - risk
links:
  - id: REQ-SYS-012
    relation: constrains
