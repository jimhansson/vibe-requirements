id: DESIGN-CH-12-8
title: "ECS Integration of Document Composition Components"
type: design-note
status: approved
tags:
  - document-schema
  - ecs
  - components
body: |
  The four new components fit naturally into the existing ECS model:

  | Component | YAML key | `entity_has_component()` key | Presence condition |
  |---|---|---|---|
  | `AppliesToComponent` | `applies-to` | `"applies-to"` | `applies_to` vector non-empty |
  | `VariantProfileComponent` | `variant-profile` | `"variant-profile"` | `customer` or `product` non-empty |
  | `CompositionProfileComponent` | `composition-profile` | `"composition-profile"` | `order` vector non-empty |
  | `RenderProfileComponent` | `render-profile` | `"render-profile"` | `format` non-empty |

  All four components are declared on the `Entity` struct alongside the
  existing components and are zero-initialised for every entity.  Any
  entity kind can technically carry any component, but in practice
  these four are only meaningful on `document-schema` entities.

  **Relation to existing document components:**

  | Component | Purpose |
  |---|---|
  | `DocumentMetaComponent` | Document *identity*: title, type, version, client, status |
  | `DocumentMembershipComponent` | Declares which documents an entity *belongs to* |
  | `DocumentBodyComponent` | Free-form body text on a section or design note |
  | `AppliesToComponent` | Which variant/document this *schema* targets |
  | `VariantProfileComponent` | Customer/product identifiers for the schema |
  | `CompositionProfileComponent` | Ordered section list for document assembly |
  | `RenderProfileComponent` | Output format for document rendering |

  The separation keeps document *content* (sections, requirements) in
  standard entity kinds while concentrating *assembly instructions* in
  `document-schema` entities â€” consistent with the ECS principle of
  attaching only the components relevant to a given entity.
traceability:
  part-of: DESIGN-CH-12
  refines: DESIGN-CH-6
