id: REQ-050
title: "Cross-platform CLI"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  The tool shall provide a CLI that runs on Linux, macOS, and Windows.
tags:
  - cli
  - portability
