id: DESIGN-CH-12-7
title: "Full Authoring Example: Variant-Aware SRS"
type: design-note
status: approved
tags:
  - document-schema
  - example
  - variant
body: |
  The following example shows a complete multi-variant SRS setup.
  One set of section entities is shared; two `document-schema`
  entities target different customers.

  **Shared section entities** (`sections/srs-common.yaml`):

  ```yaml
  id: SEC-INTRO
  title: "Introduction"
  type: section
  status: approved
  body: |
    This document describes the software requirements â€¦
  ---
  id: SEC-SCOPE
  title: "Scope"
  type: section
  status: approved
  body: |
    The system shall support the following product families â€¦
  ---
  id: SEC-FUNCTIONAL-REQS
  title: "Functional Requirements"
  type: section
  status: approved
  body: |
    See the individual requirement entities linked below.
  traceability:
    elaborates:
      - REQ-SW-001
      - REQ-SW-002
  ```

  **Acme-specific schema** (`schemas/schema-srs-acme.yaml`):

  ```yaml
  id: SCHEMA-SRS-ACME-V1
  title: "SRS Schema â€” Acme v1.0"
  type: document-schema
  status: approved
  applies-to: SRS-ACME-001
  variant-profile:
    customer: acme
    product: v1.0
  composition-profile:
    order:
      - SEC-INTRO
      - SEC-SCOPE
      - SEC-FUNCTIONAL-REQS
  render-profile:
    format: markdown
  traceability:
    part-of: SRS-ACME-001
  ```

  **BMW-specific schema** (`schemas/schema-srs-bmw.yaml`):

  ```yaml
  id: SCHEMA-SRS-BMW-R2
  title: "SRS Schema â€” BMW Release 2"
  type: document-schema
  status: approved
  applies-to: SRS-BMW-001
  variant-profile:
    customer: bmw
    delivery: release-2
  composition-profile:
    order:
      - SEC-INTRO
      - SEC-FUNCTIONAL-REQS
  render-profile:
    format: html
  traceability:
    part-of: SRS-BMW-001
  ```

  **CLI commands to inspect the schemas:**

  ```bash
  # List all document-schema entities
  vibe-req list --kind document-schema

  # Show all entities that carry a composition-profile
  vibe-req list --component composition-profile

  # Show the traceability chain for the Acme schema
  vibe-req trace SCHEMA-SRS-ACME-V1

  # Render the Acme SRS document
  vibe-req doc SRS-ACME-001 --format md --output srs-acme.md
  ```
traceability:
  part-of: DESIGN-CH-12
