id: DESIGN-CH-11-3
title: "Toolchain Requirements for C++23"
type: design-note
status: approved
tags:
  - cpp23
  - toolchain
  - build
body: |
  | Component | Minimum version | Notes |
  |---|---|---|
  | C++ compiler | GCC ≥ 13 / Clang ≥ 17 / MSVC 19.38+ | Full C++23 language support |
  | libyaml | any recent release | Runtime YAML parsing |
  | Google Test / Google Mock | 1.12+ | Unit tests only |
  | GNU Make | 4.x | Build system |

  The `CC` and `CFLAGS` Make variables were removed because no C source files
  remain.  The link step always uses `g++` (or `clang++`) because the C++
  runtime is required.

  Verify C++23 support before building:

  ```
  cd src && make check-compiler
  ```

  The `check-compiler` target compiles `compat/cxx23_check.cpp` which probes
  `if consteval`, `static operator()`, `auto(x)` decay-copy, and the
  multidimensional subscript operator.
traceability:
  part-of: DESIGN-CH-11
