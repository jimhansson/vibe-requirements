id: DESIGN-CH-4-5
title: "Coverage Module"
type: design-note
status: approved
tags:
  - architecture
  - modules
  - coverage
body: |
  `coverage.c` provides two independent layers:

  1. **Predicates** â€” `is_coverage_predicate(pred)`, `entity_is_covered(store, id)`,
     `entity_has_any_link(store, id)` â€” pure boolean tests with no I/O, suitable
     for unit testing and for use in future validator logic.

  2. **Renderers** â€” `cmd_coverage(elist, store)` and `cmd_orphan(elist, store)` â€”
     print tabular results to stdout and are called directly from `main.c`.
