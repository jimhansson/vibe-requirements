id: NFR-001
title: "CLI startup time"
type: non-functional
status: draft
priority: should
documents:
  - SRS-MAIN-001
description: |
  The CLI shall start up and respond to commands in under 500 ms on typical
  hardware.
tags:
  - performance
  - cli
---
id: NFR-002
title: "Scalability to 10 000 requirement files"
type: non-functional
status: draft
priority: should
documents:
  - SRS-MAIN-001
description: |
  The tool shall handle repositories with at least 10 000 requirement files
  without significant performance degradation.
tags:
  - performance
  - scalability
---
id: NFR-003
title: "No network access for core operations"
type: non-functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  The tool shall not require network access for core operations (create,
  validate, report).
tags:
  - offline
  - reliability
---
id: NFR-004
title: "Documented and stable file format schema"
type: non-functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  The file format schema shall be documented and stable; breaking changes
  shall require a major version increment.
tags:
  - stability
  - versioning
  - format
---
id: NFR-005
title: "Buildable from source on Linux"
type: non-functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  The tool shall be buildable from source on Linux with a documented build
  procedure.
tags:
  - build
  - linux
  - portability
---
id: NFR-006
title: "Optional delayed/batched write mode"
type: non-functional
status: draft
priority: should
documents:
  - SRS-MAIN-001
description: |
  The architecture should support an optional delayed/batched write mode with
  explicit flush semantics as an alternative to default write-through
  behavior.
tags:
  - architecture
  - write-mode
  - performance
