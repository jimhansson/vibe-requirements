name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ make libyaml-dev libgtest-dev libgmock-dev
          cmake -S /usr/src/googletest -B /tmp/googletest-build
          cmake --build /tmp/googletest-build
          sudo cmake --install /tmp/googletest-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libyaml googletest

      - name: Build
        run: cd src && make

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: cd src && make test GTEST_PREFIX=/usr/local

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: cd src && make test GTEST_PREFIX=$(brew --prefix googletest)

  lint:
    name: Lint (cppcheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            src/*.c src/*.cpp
