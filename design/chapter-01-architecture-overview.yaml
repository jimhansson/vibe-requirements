id: DESIGN-CH-1
title: "Architecture Overview"
type: design-note
status: approved
tags:
  - architecture
  - overview
body: |
  The tool discovers requirement files automatically by scanning the entire
  repository for recognized file extensions (e.g., `.yaml`/`.yml` files
  containing a top-level `id` field). Projects may optionally add a
  `.vibe-req.yaml` configuration file at the repository root to provide glob
  patterns that restrict or extend discovery. The directory layout below is
  the **recommended convention** produced by `vibe-req init`; it is not
  enforced:

  ```
  project-repo/
  в”ңв”Җв”Җ requirements/
  в”Ӯ   в”ңв”Җв”Җ sys/          # System-level requirements (recommended)
  в”Ӯ   в”ңв”Җв”Җ sw/           # Software requirements (recommended)
  в”Ӯ   в”ңв”Җв”Җ hw/           # Hardware requirements (recommended)
  в”Ӯ   в””в”Җв”Җ safety/       # Safety / regulatory requirements (recommended)
  в”ңв”Җв”Җ stories/          # User stories (recommended)
  в”ңв”Җв”Җ design/           # System design documents (SDD) (recommended)
  в”ңв”Җв”Җ tests/            # Test cases (recommended)
  в”ңв”Җв”Җ external/         # Normative references (standards, directives) (recommended)
  в””в”Җв”Җ .vibe-req.yaml    # Optional configuration (glob patterns, ID prefix, schema version, вҖҰ)

            в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
            в”Ӯ          vibe-req  (binary)          в”Ӯ
            в”Ӯ                                      в”Ӯ
            в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ   в”Ӯ
            в”Ӯ  в”Ӯ   CLI   в”Ӯ  в”Ӯ   GUI (optional) в”Ӯ   в”Ӯ
            в”Ӯ  в””в”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”ҳ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ   в”Ӯ
            в”Ӯ       в”Ӯ                в”Ӯ             в”Ӯ
            в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ
            в”Ӯ  в”Ӯ         Core Library           в”Ӯ  в”Ӯ
            в”Ӯ  в”Ӯ  parser В· validator В· linker   в”Ӯ  в”Ӯ
            в”Ӯ  в”Ӯ  reporter В· tracer             в”Ӯ  в”Ӯ
            в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ
            в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
                           в”Ӯ reads / writes
                      в”Ңв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”җ
                      в”Ӯ  files  в”Ӯ  (YAML, вҖҰ)
                      в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
  ```
