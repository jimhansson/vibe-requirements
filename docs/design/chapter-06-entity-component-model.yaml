id: DESIGN-CH-6
title: "Entity-Component-Inspired Domain Model"
type: design-note
status: approved
tags:
  - architecture
  - ecs
  - domain-model
body: |
  An ECS-inspired model can separate common, regular fields from irregular,
  type-specific fields without deep inheritance trees.
---
id: DESIGN-CH-6-1
title: "Entity"
type: design-note
status: approved
tags:
  - ecs
body: |
  `Entity` is a stable ID (`REQ-SW-001`, `TC-SW-001`, `EXT-MACH-DIR`, etc.).
traceability:
  part-of: DESIGN-CH-6
---
id: DESIGN-CH-6-2
title: "Common Components (Regular Size)"
type: design-note
status: approved
tags:
  - ecs
  - components
body: |
  Store predictable fields in dense component tables:

  - `IdentityComponent` (`id`, `title`, `kind`)
  - `LifecycleComponent` (`status`, `priority`, `owner`, `version`)
  - `TextComponent` (`description`, `rationale`)
  - `TagComponent` (`tags`)
  - `SourceComponent` (`sources`)

  These components cover most entities and are suitable for cache-friendly
  storage and batch queries.
traceability:
  part-of: DESIGN-CH-6
---
id: DESIGN-CH-6-3
title: "Irregular Components (Variable Size)"
type: design-note
status: approved
tags:
  - ecs
  - components
body: |
  Store sparse or large data in separate, optional components:

  - `AssumptionComponent` (`text`, `status`, `source`) — any entity may carry this
  - `ConstraintComponent` (`text`, `kind`, `source`) — any entity may carry this;
    `kind` is e.g. `legal`, `technical`, `environmental`
  - `DocumentMetaComponent` (`title`, `doc-type`, `version`, `client`, `status`) —
    any entity representing a document (SRS, SDD, …) may carry this
  - `DocumentMembershipComponent` (`doc_ids`, `count`) — attaches any entity to one
    or more document entities
  - `TestProcedureComponent` (`preconditions`, `steps`, `expected-result`)
  - `ClauseCollectionComponent` (external standard clauses/annexes/articles)
  - `DocumentBodyComponent` (long free-form markdown/text blocks)
  - `AttachmentComponent` (references to binary or generated artifacts)

  Both `AssumptionComponent` and `ConstraintComponent` are pure ECS components:
  no specialised entity type is required to carry them. Any entity (requirement,
  story, design note, …) may have one or both attached. Links to documents or
  other requirements are handled via the shared relation component (`links:`).

  `DocumentMetaComponent` and `DocumentMembershipComponent` implement the ECS
  document model: a document (SRS, SDD, etc.) is just an entity with
  `ENTITY_KIND_DOCUMENT`. Its properties are expressed via
  `DocumentMetaComponent`; any other entity declares membership in one or more
  documents via `DocumentMembershipComponent`. This naturally supports multiple
  SRS per client and N:M entity-to-document relationships without a rigid type
  hierarchy.

  **YAML schema:**

  ```yaml
  # A document entity
  id: SRS-CLIENT-001
  title: SRS for Client Project
  type: document          # also: srs, sdd
  doc-meta:
    doc-type: SRS
    version: 1.0
    client: ClientCorp
    status: approved

  ---
  # Any entity can declare membership in one or more documents
  id: REQ-SW-001
  type: functional
  documents:
    - SRS-CLIENT-001
    - SDD-SYS-001
  ```

  > **Schema note:** The earlier `AssumptionComponent` included a `risk_if_false`
  > field. Under the new schema that information belongs either in the `text` of a
  > dedicated risk entity or in a linked document referenced via `source`. The
  > previous flat YAML keys (`statement:`, `risk_if_false:`, `constraint_type:`)
  > are replaced by nested `assumption:` and `constraint:` mapping nodes.

  This separation keeps the hot path small while allowing rich per-entity data.
traceability:
  part-of: DESIGN-CH-6
---
id: DESIGN-CH-6-4
title: "Traceability Component"
type: design-note
status: approved
tags:
  - ecs
  - traceability
body: |
  Traceability is an ECS component attached to any entity — not a separate
  `TraceabilityLink` entity type.

  ```c
  TraceabilityComponent {
      entries: flat string of "\n"-separated "target_id\trelation_type" pairs
      count:   number of outgoing links
  }
  ```

  **YAML key:** `traceability` — a relation-keyed mapping where each key is a
  relation type and each value is a single target ID (scalar) or a list of
  target IDs (sequence):

  ```yaml
  traceability:
    derived-from: REQ-SYS-005
    verified-by:
      - TC-SW-001
      - TC-SW-002
    implemented-in: src/auth/login.c
  ```

  **Relation types** are free-form strings (e.g. `"implements"`, `"verifies"`,
  `"refines"`, `"derived-from"`).

  **N:M relationships** are natural because any entity can carry the component
  and each entry points to any target entity or artefact.

  **Integration with TripletStore:** The component and the triplet store serve
  complementary roles that avoid duplication:

  - `TraceabilityComponent` on an `Entity` is the per-entity view populated
    during YAML parsing. It is a fixed-size, stack-allocatable struct (no heap).
  - `TripletStore` is the global indexed view. Each entry in
    `TraceabilityComponent` maps directly to a `(entity_id, relation_type,
    target_id)` triple.
  - `entity_traceability_to_triplets(entity, store)` loads the component's
    entries into the store as triples; the store deduplicates automatically.
  - Queries that need global lookup (e.g. "find everything verified by TC-SW-001")
    are served by `triplet_store_find_by_object()`; per-entity forward reads are
    served by the component directly.
traceability:
  part-of: DESIGN-CH-6
---
id: DESIGN-CH-6-5
title: "Source Component"
type: design-note
status: approved
tags:
  - ecs
  - sources
body: |
  `SourceComponent` is an ECS component that records normative source references
  associated with any entity — external standards, regulations, requirement IDs,
  or other document citations.

  ```c
  SourceComponent {
      sources: flat newline-separated string of source references
      count:   number of sources stored
  }
  ```

  **YAML key:** `sources` — a sequence of scalars or mappings:

  ```yaml
  sources:
    - external: EU-2016-679:article:32   # GDPR Article 32
    - id: REQ-SYS-005
    - EN-ISO-13849-2023:clause:4.5.2     # plain scalar
  ```

  For mapping items, the value of the first key-value pair found is extracted
  and stored, regardless of the key name (`external`, `id`, etc.). Plain scalar
  items are stored as-is.

  Any entity kind can carry this component.
traceability:
  part-of: DESIGN-CH-6
---
id: DESIGN-CH-6-6
title: "Why ECS-Like Here"
type: design-note
status: approved
tags:
  - ecs
  - rationale
body: |
  - Prevents monolithic requirement structs with many optional fields.
  - Makes it easier to add new entity kinds without schema rewrites.
  - Supports GUI features (property panels and graph views) by querying only
    needed components.
  - Helps separate regular and irregular data for better memory behavior.
traceability:
  part-of: DESIGN-CH-6
---
id: DESIGN-CH-6-7
title: "ECS Mutation API (Disk-Synchronized)"
type: design-note
status: approved
tags:
  - ecs
  - api
  - mutation
body: |
  Related requirements: REQ-066, REQ-067, REQ-068.

  Component mutation APIs should mirror triplet write-through guarantees:

  ```
  set_component_and_flush(entity_id, component) -> Result<(), Error>
  patch_component_and_flush(entity_id, patch) -> Result<(), Error>
  clear_component_and_flush(entity_id, component_type) -> Result<(), Error>
  ```

  Constraints:

  - Component updates must validate against entity kind and schema version.
  - Updates that affect generated links/sources must rebuild related indexes
    before write.
  - GUI should call only these repository APIs, not direct component table
    setters.
traceability:
  part-of: DESIGN-CH-6
