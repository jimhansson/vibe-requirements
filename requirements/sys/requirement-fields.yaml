id: REQ-021
title: "Optional type field - open vocabulary"
type: functional
status: draft
priority: may
documents:
  - SRS-MAIN-001
description: |
  A requirement may optionally carry a type field; the tool shall not
  prescribe or validate a fixed set of allowed values - the type vocabulary
  is left to user or project configuration.
tags:
  - fields
  - type
  - open-vocabulary
