name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify C++23-capable compiler
        run: |
          g++ --version
          g++ -std=c++23 -x c++ - <<'EOF'
          #if __cplusplus <= 202002L
          #error "C++23 required"
          #endif
          int main(){}
          EOF

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ make libyaml-dev libgtest-dev libgmock-dev
          cmake -S /usr/src/googletest -B /tmp/googletest-build
          cmake --build /tmp/googletest-build
          sudo cmake --install /tmp/googletest-build

      - name: Check C++23 compiler features
        run: make check-compiler

      - name: Build
        run: make

      - name: Run tests
        run: make test GTEST_PREFIX=/usr/local

  lint:
    name: Lint (cppcheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            src/*.c src/*.cpp

  publish-docs:
    name: Publish SRS and SDD to Wiki
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ make libyaml-dev

      - name: Build
        run: make

      - name: Publish docs to wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/publish-docs.sh
