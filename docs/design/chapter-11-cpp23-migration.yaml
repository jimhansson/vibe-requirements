id: DESIGN-CH-11
title: "C++23 Migration: Rationale and Idioms"
type: design-note
status: approved
tags:
  - cpp23
  - migration
  - implementation
body: |
  The codebase was migrated from a mixed C11/C++17 implementation to a pure
  C++23 codebase.  This chapter records the rationale, the key idiom changes,
  and the toolchain requirements that resulted from that migration.
---
id: DESIGN-CH-11-1
title: "Migration Rationale"
type: design-note
status: approved
tags:
  - cpp23
  - migration
body: |
  The original implementation mixed C11 (`.c` files with fixed-size `char[]`
  structs) and C++17 (`.cpp` files for TripletStore) and required manual memory
  management (`entity_free`, `entity_copy`, `entity_list_free`).  This led to:

  - Fixed field-length limits (e.g. 64-byte IDs, 256-byte titles) that silently
    truncated long values.
  - A flat newline-separated buffer pattern for multi-valued fields that
    required buffer arithmetic and a `count` field alongside each array.
  - A heap-allocated `char *` pattern for large/rare fields that required
    `strdup`/`free` discipline and was a source of potential leaks.
  - A `yaml_helpers.c` utility module that became dead code as the parser was
    incrementally rewritten.

  Moving to C++23 with `std::string` and `std::vector` throughout eliminated
  all of these issues via RAII.  The C-compatible ABI is preserved in
  `triplet_store_c.h` via `extern "C"` for external consumers.
traceability:
  part-of: DESIGN-CH-11
