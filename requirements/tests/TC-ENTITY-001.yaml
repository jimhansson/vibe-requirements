id: TC-ENTITY-001
type: test-case
title: "Entity struct: component initialisation, population, and lifecycle management"
status: draft
description: |
  Verify that the Entity struct and its component sub-structs
  (IdentityComponent, LifecycleComponent, TextComponent, TagComponent,
  TraceabilityComponent, etc.) are correctly initialised, populated, and
  managed by entity_list_init(), entity_list_add(), entity_list_free(), and
  related helpers. All entity kinds (ENTITY_KIND_REQUIREMENT,
  ENTITY_KIND_STORY, ENTITY_KIND_TEST_CASE, ENTITY_KIND_EXTERNAL,
  ENTITY_KIND_DOCUMENT, etc.) must be represented.
preconditions:
  - entity.h and entity.c are compiled and linked.
  - No external runtime dependencies beyond the C standard library.
steps:
  - Initialise an EntityList; verify initial state is empty.
  - Create entities of each supported kind; verify identity.kind is set
    correctly.
  - Add entities to an EntityList; verify the count increments and pointer
    stability holds.
  - Populate each component (lifecycle, text, tags, traceability, user story,
    test procedure, etc.) and verify the values round-trip through the struct
    without truncation for typical inputs.
  - Free the list; verify no memory errors.
expected_results:
  - entity_list_init() produces a zeroed, empty list.
  - Each entity kind constant maps to the correct string representation used
    by the report and scaffold modules.
  - Component fields are populated independently; unset components remain
    zeroed.
  - entity_list_free() releases all allocated memory without error.
verification_method: test
