id: DESIGN-CH-9
title: "Memory Layout and Ownership"
type: design-note
status: approved
tags:
  - architecture
  - memory
  - implementation
body: |
  Since the C++23 migration all `Entity` component fields use C++ value-type
  containers (`std::string`, `std::vector`).  There are no fixed-size `char[]`
  arrays or heap-allocated `char *` pointer fields in the entity structs.  RAII
  handles all lifetime management; there is no `entity_free()` or
  `entity_copy()`.
---
id: DESIGN-CH-9-1
title: "Entity Struct: std::string and std::vector Fields"
type: design-note
status: approved
tags:
  - memory
  - entity
  - implementation
body: |
  Every component field in `Entity` is either a `std::string` (single-valued)
  or a `std::vector<std::string>` / `std::vector<std::pair<std::string,std::string>>`
  (multi-valued).  C++ default construction initialises all fields to empty;
  there is no "absent vs. empty" distinction at the struct level — emptiness
  is the sentinel for absence.

  This design:
  - Removes all fixed-size field-length limits from the previous C
    implementation (no more 64-byte IDs, 256-byte titles, etc.).
  - Eliminates `memcpy`-based entity copying: `EntityList = std::vector<Entity>`
    uses copy-construction automatically.
  - Makes `entity_apply_filter()` iterate a `std::vector<Entity>` with
    range-based for loops rather than raw pointer arithmetic.

  The tradeoff is that each `std::string` carries a small-string-optimisation
  (SSO) buffer plus potential heap allocation.  For the typical entity sizes
  in vibe-req (IDs ≤ 64 chars, descriptions in the KB range) the SSO avoids
  most heap allocations for short fields, and the occasional large body or
  description field allocates exactly as much as it needs.
