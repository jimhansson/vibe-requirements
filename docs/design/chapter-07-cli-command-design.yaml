id: DESIGN-CH-7-4
title: "Auto-increment ID helper workflow"
type: design-note
status: approved
tags:
  - cli
  - ids
body: |
  The CLI supports two workflows for avoiding duplicate entity IDs:

  1. `next-id` prints the next unused numeric ID for a given type and prefix.
  2. `new --next` (or `new <type> auto`) assigns the next ID automatically
     and scaffolds the file in one step.

  Both workflows scan the specified directory for existing entities of the
  same kind and prefix before choosing the next numeric suffix.
traceability:
