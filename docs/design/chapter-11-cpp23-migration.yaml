id: DESIGN-CH-11-2
title: "Key C++23 Idiom Changes"
type: design-note
status: approved
tags:
  - cpp23
  - migration
  - idioms
body: |
  **Entity string fields: `char[]` → `std::string`**

  Before: `char id[64]`, `char title[256]`, etc.
  After: `std::string id`, `std::string title`, etc.

  No length limits; no `strncpy`; assignment is direct: `e.identity.id = "REQ-SW-001"`.

  **Entity list: manual array → `std::vector<Entity>`**

  Before: `EntityList { Entity *items; size_t count; }` with `entity_list_add()` / `entity_list_free()`.
  After: `using EntityList = std::vector<Entity>;`

  Push with `list.push_back(e)`; no explicit free.

  **Multi-valued fields: flat newline buffers → `std::vector<std::string>`**

  Before: `char tags[1024]` with `count` field and `yaml_append_to_flat()`.
  After: `std::vector<std::string> tags;` — push with `tags.push_back(tag)`.

  **Memory management: manual → RAII**

  `entity_free()`, `entity_copy()`, and `entity_list_free()` were removed.
  Destructors handle all cleanup automatically when `Entity` or `EntityList`
  values go out of scope.

  **C++23 language features used**

  | Feature | Usage |
  |---|---|
  | `if consteval` | `compat/cxx23_check.cpp` compile-time probe |
  | `static operator()` | `compat/cxx23_check.cpp` compile-time probe |
  | `auto(x)` decay-copy | `compat/cxx23_check.cpp` compile-time probe |
  | Multidimensional `operator[]` | `compat/cxx23_check.cpp` compile-time probe |
  | `std::optional` | TripletStore slot storage (tombstone pattern) |
  | `std::unordered_map` | TripletStore subject/predicate/object indexes |
traceability:
  part-of: DESIGN-CH-11
