id: DESIGN-CH-12
title: "Schema-Driven Document Composition System"
type: design-note
status: approved
tags:
  - architecture
  - document-schema
  - composition
  - variant
body: |
  The schema-driven document composition system provides a structured,
  variant-aware way to define how SRS/SDD documents are assembled from
  their constituent section entities.

  Instead of treating a document purely as a flat container of member
  entities, a `document-schema` entity acts as a blueprint that
  captures:

  - **Which variant** (customer/product/delivery) the schema targets
    (`variant-profile`)
  - **Which section IDs** are included and in what order
    (`composition-profile`)
  - **What output format** to use when rendering
    (`render-profile`)
  - **Which document(s) or variants** this schema applies to
    (`applies-to`)

  This enables projects that serve multiple clients or product lines
  to maintain a single set of section entities and produce variant-
  specific documents by selecting different schemas â€” without
  duplicating requirement content.
traceability:
  refines: DESIGN-CH-6
---
id: DESIGN-CH-12-1
title: "document-schema Entity Kind"
type: design-note
status: approved
tags:
  - document-schema
  - entity-kind
body: |
  `ENTITY_KIND_DOCUMENT_SCHEMA` is mapped from the YAML `type:
  document-schema` field.

  A `document-schema` entity is distinct from a `document` entity
  (type: `srs`, `sdd`, `document`).  The `document` entity describes
  the document's identity and metadata (`doc-meta:`); the
  `document-schema` entity describes *how that document is constructed*
  â€” which sections to include, in which order, for which variant,
  and in which format.

  **Minimal example:**

  ```yaml
  id: SCHEMA-SRS-ACME-001
  title: "SRS Schema for Acme v1.0"
  type: document-schema
  status: approved
  ```

  The entity is discoverable via:

  ```bash
  vibe-req list --kind document-schema
  ```

  and carries the same lifecycle fields (`status`, `priority`, `owner`,
  `version`) as any other entity kind.
traceability:
  part-of: DESIGN-CH-12
---
id: DESIGN-CH-12-2
title: "AppliesToComponent"
type: design-note
status: approved
tags:
  - document-schema
  - applies-to
  - variant
body: |
  `AppliesToComponent` records which document IDs or variant
  identifiers a schema applies to.  The YAML key is `applies-to`
  (hyphenated, not underscored) and accepts either a scalar or a
  sequence of strings.

  **Scalar form:**

  ```yaml
  id: SCHEMA-SRS-ACME-001
  type: document-schema
  applies-to: SRS-ACME-001
  ```

  **Sequence form:**

  ```yaml
  id: SCHEMA-SRS-MULTI-001
  type: document-schema
  applies-to:
    - SRS-ACME-001
    - SRS-BMW-001
  ```

  The values may be document entity IDs (e.g. `SRS-ACME-001`) or
  free-form variant identifiers (e.g. `acme`, `eu-market`).  The
  tool stores them verbatim in `AppliesToComponent.applies_to`
  (`std::vector<std::string>`).

  **`entity_has_component()` key:** `"applies-to"`

  **`--component` filter:**

  ```bash
  vibe-req list --component applies-to
  ```
traceability:
  part-of: DESIGN-CH-12
---
id: DESIGN-CH-12-3
title: "VariantProfileComponent"
type: design-note
status: approved
tags:
  - document-schema
  - variant-profile
body: |
  `VariantProfileComponent` captures the customer and product (or
  delivery) identifiers that parameterize a document variant.  The
  YAML key is `variant-profile:` (a mapping).

  | Sub-key | Alias | Field | Description |
  |---|---|---|---|
  | `customer` | â€” | `VariantProfileComponent::customer` | Customer or market identifier |
  | `product` | `delivery` | `VariantProfileComponent::product` | Product version or delivery milestone |

  Both `product` and `delivery` map to the same `product` field;
  `product` is the canonical key and `delivery` is accepted as an alias
  for backward compatibility.

  **Example:**

  ```yaml
  id: SCHEMA-SRS-ACME-V1
  type: document-schema
  variant-profile:
    customer: acme
    product: v1.0
  ```

  ```yaml
  id: SCHEMA-SRS-BMW-R2
  type: document-schema
  variant-profile:
    customer: bmw
    delivery: release-2
  ```

  **`entity_has_component()` key:** `"variant-profile"`
  (present when either `customer` or `product` is non-empty)
traceability:
  part-of: DESIGN-CH-12
---
id: DESIGN-CH-12-4
title: "CompositionProfileComponent"
type: design-note
status: approved
tags:
  - document-schema
  - composition-profile
  - sections
body: |
  `CompositionProfileComponent` defines the explicit, ordered list of
  section entity IDs that form the document structure.  The YAML key
  is `composition-profile:` (a mapping containing an `order:` sequence).

  The `order` sequence is the authoritative section list â€” each entry
  is an entity `id` that should resolve to a `section` (or
  `design-note`) entity carrying `DocumentBodyComponent` content.

  **Example:**

  ```yaml
  id: SCHEMA-SRS-ACME-V1
  type: document-schema
  composition-profile:
    order:
      - SEC-INTRO
      - SEC-SCOPE
      - SEC-FUNCTIONAL-REQS
      - SEC-NON-FUNCTIONAL-REQS
      - SEC-TRACEABILITY
  ```

  Section entities referenced in `order` should be authored separately
  as `type: section` (or `type: design-note`) entities with `body:`
  content.  The render pipeline assembles the sections in the declared
  order.

  **`entity_has_component()` key:** `"composition-profile"`
  (present when `order` is non-empty)

  **`--component` filter:**

  ```bash
  vibe-req list --component composition-profile
  ```
traceability:
  part-of: DESIGN-CH-12
---
id: DESIGN-CH-12-5
title: "RenderProfileComponent"
type: design-note
status: approved
tags:
  - document-schema
  - render-profile
  - output-format
body: |
  `RenderProfileComponent` specifies the target output format when the
  document is rendered.  The YAML key is `render-profile:` (a mapping
  containing a `format:` scalar).

  | `format` value | Description |
  |---|---|
  | `markdown` | Render as Markdown (`.md`) |
  | `html` | Render as self-contained HTML |

  **Example:**

  ```yaml
  id: SCHEMA-SRS-ACME-V1
  type: document-schema
  render-profile:
    format: markdown
  ```

  When `format` is absent or the component is not present, the default
  render format is determined by the CLI `--format` flag (which itself
  defaults to Markdown).

  **`entity_has_component()` key:** `"render-profile"`
  (present when `format` is non-empty)
traceability:
  part-of: DESIGN-CH-12
---
id: DESIGN-CH-12-6
title: "Section Entities and Narrative Content"
type: design-note
status: approved
tags:
  - document-schema
  - sections
  - narrative
body: |
  Section entities are the atomic building blocks of composed
  documents.  They carry narrative content through
  `DocumentBodyComponent` (YAML key `body:`).

  ```yaml
  id: SEC-INTRO
  title: "Introduction"
  type: section
  status: approved
  body: |
    This document specifies the software requirements for the Acme
    product line. It is intended for use by the development team and
    the client's technical stakeholders.
  ```

  Section entities may also carry `TraceabilityComponent` links to
  requirements, design notes, or other artefacts:

  ```yaml
  id: SEC-FUNCTIONAL-REQS
  title: "Functional Requirements"
  type: section
  status: approved
  body: |
    This section enumerates all functional requirements â€¦
  traceability:
    elaborates:
      - REQ-SW-001
      - REQ-SW-002
  ```

  Any section that is not referenced by a `composition-profile.order`
  sequence will appear as an orphan in `vibe-req orphan` output,
  which helps catch stale or unlinked sections.
traceability:
  part-of: DESIGN-CH-12
