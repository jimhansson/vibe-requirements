id: REQ-065
title: "No web browser or JavaScript runtime required"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  The GUI shall not require installation of a web browser or JavaScript
  runtime.
tags:
  - gui
  - native
  - no-browser
---
id: REQ-066
title: "Write-through persistence by default"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  By default, accepted entity and link mutations from CLI or GUI shall be
  persisted directly to repository files (write-through mode) rather than
  only updating in-memory state.
tags:
  - persistence
  - write-through
  - gui
  - cli
---
id: REQ-067
title: "Entity provenance metadata"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  The tool shall maintain entity provenance metadata mapping each entity ID
  to its owning location (file path and document position within
  multi-document files) so updates are written to the correct document.
tags:
  - persistence
  - provenance
  - multi-document
---
id: REQ-068
title: "Atomic failure on persistence error"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  If persistence of an accepted mutation fails, the operation shall fail
  without leaving the in-memory model and on-disk files in diverged states.
tags:
  - persistence
  - error-handling
  - consistency
---
id: REQ-069
title: "Atomic file updates"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  File updates performed by mutation operations shall be atomic at file
  level (e.g., temporary file plus rename) to avoid partial writes.
tags:
  - persistence
  - atomicity
  - file-update
