id: DESIGN-CH-9-2
title: "Multi-Valued Fields: std::vector"
type: design-note
status: approved
tags:
  - memory
  - entity
  - implementation
body: |
  Multi-valued component fields use `std::vector`:

  | Component field | C++ type |
  |---|---|
  | `TagComponent.tags` | `std::vector<std::string>` |
  | `AcceptanceCriteriaComponent.criteria` | `std::vector<std::string>` |
  | `DocumentMembershipComponent.doc_ids` | `std::vector<std::string>` |
  | `SourceComponent.sources` | `std::vector<std::string>` |
  | `TraceabilityComponent.entries` | `std::vector<std::pair<std::string,std::string>>` |
  | `TestProcedureComponent.preconditions` | `std::vector<std::string>` |
  | `TestProcedureComponent.steps` | `std::vector<std::pair<std::string,std::string>>` |
  | `ClauseCollectionComponent.clauses` | `std::vector<std::pair<std::string,std::string>>` |
  | `AttachmentComponent.attachments` | `std::vector<std::pair<std::string,std::string>>` |

  The previous flat newline-separated buffer pattern (`count` field, fixed-size
  `char[]` array) was entirely removed.  Iteration is a standard range-based
  for loop; no buffer-splitting or `count` bookkeeping is required.
