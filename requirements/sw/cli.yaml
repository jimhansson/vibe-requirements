id: REQ-051
title: "CRUD commands for requirements and documents"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  The CLI shall provide commands to create, read, update, and delete
  requirements and related documents.
tags:
  - cli
  - crud
