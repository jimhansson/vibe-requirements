id: REQ-060
title: "Optional native GUI application"
type: functional
status: draft
priority: should
documents:
  - SRS-MAIN-001
description: |
  The tool shall provide an optional native GUI application (not
  browser-based) for browsing and editing requirements.
tags:
  - gui
  - native
---
id: REQ-061
title: "GUI reads and writes same file formats as CLI"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  The GUI shall read and write the same file formats used by the CLI with
  no intermediary database.
tags:
  - gui
  - file-format
  - consistency
---
id: REQ-062
title: "Filterable and sortable requirement list"
type: functional
status: draft
priority: should
documents:
  - SRS-MAIN-001
description: |
  The GUI shall provide a filterable, sortable list of all requirements and
  documents in the repository.
tags:
  - gui
  - list-view
  - filtering
  - sorting
