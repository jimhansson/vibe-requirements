id: REQ-052
title: "validate command"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  The CLI shall provide a `validate` command that runs the entity validation
  function (REQ-029) and reports all broken links, duplicate identifiers, and
  unresolvable references.
links:
  - REQ-029
tags:
  - cli
  - validation
---
id: REQ-053
title: "report command"
type: functional
status: draft
priority: should
documents:
  - SRS-MAIN-001
description: |
  The CLI shall provide a `report` command that generates a human-readable
  summary (e.g., Markdown or HTML) of the requirement set.
tags:
  - cli
  - reporting
---
id: REQ-054
title: "trace command"
type: functional
status: draft
priority: should
documents:
  - SRS-MAIN-001
description: |
  The CLI shall provide a `trace` command that outputs the traceability graph
  for one or all requirements.
tags:
  - cli
  - traceability
---
id: REQ-055
title: "status command"
type: functional
status: draft
priority: should
documents:
  - SRS-MAIN-001
description: |
  The CLI shall provide a `status` command showing counts of requirements per
  status and priority.
tags:
  - cli
  - reporting
---
id: REQ-056
title: "Non-zero exit code on validation failure"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  The CLI shall exit with a non-zero code when validation fails, making it
  suitable for use in CI pipelines.
tags:
  - cli
  - ci
  - validation
---
id: REQ-057
title: "Single self-contained executable"
type: functional
status: draft
priority: should
documents:
  - SRS-MAIN-001
description: |
  The CLI shall ideally be distributed as a single self-contained executable
  with no runtime dependencies.
tags:
  - cli
  - distribution
  - portability
---
id: REQ-058
title: "Graceful handling of malformed input files"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  The tool shall gracefully handle malformed or invalid input files: when a
  file cannot be parsed or fails schema validation, the tool shall report the
  error (including file path and, where possible, the line/column or field
  name) and continue processing all remaining files rather than aborting.
tags:
  - cli
  - error-handling
  - validation
---
id: REQ-059
title: "--fail-fast flag"
type: functional
status: draft
priority: should
documents:
  - SRS-MAIN-001
description: |
  The CLI shall provide a `--fail-fast` flag that causes processing to stop
  immediately on the first encountered parse or validation error; this flag is
  intended for use in CI pipelines where early termination is preferred.
tags:
  - cli
  - ci
  - error-handling
