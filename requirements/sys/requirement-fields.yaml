id: REQ-020
title: "Project-unique human-readable identifier"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  Each requirement shall have a project-unique, human-readable identifier
  (e.g., `REQ-SYS-042`).
tags:
  - identifier
  - uniqueness
