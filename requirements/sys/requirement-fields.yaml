id: REQ-028
title: "Arbitrary user-defined additional fields"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  Requirements and all other entity types shall support arbitrary
  user-defined additional fields beyond those listed in this specification;
  the tool shall preserve and pass through unrecognized fields without
  treating them as errors.
tags:
  - fields
  - extensibility
  - forward-compatibility
---
id: REQ-029
title: "Entity validation function"
type: functional
status: draft
priority: must
documents:
  - SRS-MAIN-001
description: |
  The tool shall provide an entity validation function that verifies:
  (a) no identifier is used more than once across all files in the
  repository, (b) every link target refers to an identifier that actually
  exists, and (c) every external normative source reference resolves to a
  known external source document; validation failures shall be reported with
  enough context for the user to locate and correct the problem.
tags:
  - validation
  - identifier
  - links
  - external-sources
